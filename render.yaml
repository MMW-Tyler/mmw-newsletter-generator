services:
  - type: web
    name: mmw-newsletter-generator
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    branch: main
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_LOGIN_EMAIL
        sync: false
      - key: APP_LOGIN_PASSWORD
        sync: false
